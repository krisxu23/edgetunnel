name: 🔄 Sync upstream

on:
  schedule:
    - cron: "0 2 * * *"  # 每天 UTC 2:00（北京时间 10:00）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}  # ✅ 用 PAT checkout 保证权限
          fetch-depth: 0

      - name: ⬆️ Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🔗 Add upstream
        run: git remote add upstream https://github.com/cmliu/edgetunnel.git

      - name: 📥 Fetch & merge
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit

      - name: 🚀 Push to fork
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}  # ✅ 核心：必须用 PAT

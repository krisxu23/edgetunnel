name: 🔄 Sync upstream

on:
  # 定时触发（UTC 时间）：每天 UTC 02:00（北京时间 10:00）
  schedule:
    - cron: "0 2 * * *"  # 每天一次，可改（如每6小时：0 */6 * * *）

  # 支持手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须完整历史

      - name: ⬆️ Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🔗 Add upstream
        run: git remote add upstream https://github.com/cmliu/edgetunnel.git

      - name: 📥 Fetch upstream
        run: git fetch upstream

      - name: 🔀 Merge upstream/main into local main
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: 🚀 Push to origin
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动提供，无需手动设
